[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "autoharness-cloud"
version = "0.1.0"
description = "Self-hostable web dashboard for AutoHarness audit visualization and team governance management"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "AutoHarness Team" },
]
dependencies = [
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "jinja2>=3.1.0",
    "autoharness",
]

[project.scripts]
autoharness-cloud = "autoharness_cloud.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["autoharness_cloud"]
