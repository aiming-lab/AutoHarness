site_name: AutoHarness
site_description: The Complete Harness Engineering Framework for AI Agents
site_url: https://autoharness.dev
repo_url: https://github.com/aiming-lab/AutoHarness
repo_name: autoharness/autoharness

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
    - search.suggest

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Core Concepts:
    - Agent Loop: concepts/agent-loop.md
    - Context Management: concepts/context-management.md
    - Governance Pipeline: concepts/governance.md
    - Tool System: concepts/tools.md
    - Skill System: concepts/skills.md
    - Agent Orchestration: concepts/agents.md
    - Session Management: concepts/sessions.md
    - Observability: concepts/observability.md
  - Guides:
    - Wrap an Existing Client: guides/wrap-client.md
    - Build a Custom Agent: guides/custom-agent.md
    - Multi-Agent Workflows: guides/multi-agent.md
    - Production Deployment: guides/production.md
  - API Reference:
    - AgentLoop: api/agent-loop.md
    - Constitution: api/constitution.md
    - Tool System: api/tools.md
    - Skill System: api/skills.md
    - Context Engine: api/context.md
    - Prompt System: api/prompt.md
    - Session: api/session.md
    - Observability: api/observability.md
  - CLI Reference: cli.md
  - Changelog: changelog.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
